<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="img1">
    <img src="project-images/loginrbg.png" alt="login image">
    </div>
    <table class="user">
        
        <form action="main.html">
            
            <tr>
                <td><label for="">User Name : </label></td>
                <td><input type="text" placeholder="Enter Your User Name" required></td>
            </tr>
            <tr>
                <td><label for="">Password : </label></td>
                <td><input type="password" placeholder="Enter Your Password" required></td>
            </tr>
            <tr>
                <td><a href="">Forget Password</a></td>
            </tr>
            <tr>
                <td><input type="submit" value="Login"></td>
                <td><input type="reset" value="Clear"></td>
            </tr>
            <tr>
                <td>
                    <p>Don't have account please <a href="register.html">Register Here</a></p>
                </td>
            </tr>
        </form>
    </table>
</body>

</html>
