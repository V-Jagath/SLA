<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="project-images/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
<link rel="shortcut icon" href="../../Project/project-images/favicon.ico" type="image/x-icon">
    <style>
        * {
            background-color: #F2F2F2;
            color: #000000;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            justify-items: center;
        }

        .user {
            background-color: #F2F2F2;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
            width: 350px;

        }

        .user a {
            text-decoration: none;
            color: rgb(5, 5, 243);
        }

        .user input {

            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        input[type="submit"]:hover {
            background-color: green;
            color: white;
        }

        input[type="reset"]:hover {
            background-color: red;
            color: white;
        }

        .register button {
            padding: 6px;
            border-radius: 10px;

        }

        .password button {
            padding: 4px;
            border-radius: 10px;
        }

        .password button:hover {
            background-color: blue;
            color: white;
        }

        .register button:hover {
            background-color: blue;
            color: white;

        }

        .submit input {
            width: 140px;
        }
    </style>
</head>

<body>
    <form action="homepage.html" class="user">
        <center>
            <img src="../../Project/project-images/loginrbg.png" alt="login image">
            <br><br>
            <label for="">User Name : </label>
            <input type="text" placeholder="Enter Your User Name" required><br><br>
            <label for="">Password : </label>
            <input type="password" placeholder="Enter Your Password" required><br><br>
            <div class="password">
                <p>Don't remember your password <a href="">Forget Password</a></p><br><br>
            </div>
            <div class="submit">
                <input type="submit" value="Login">
                <input type="reset" value="Clear">
            </div>
        </center>
    </form>
    <div class="register">
                <p>Don't have account please <a href="register.html"> <button> Register Here</button></a></p>
            </div>
</body>

</html>
